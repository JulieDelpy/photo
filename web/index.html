<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片质量评价 & 美颜系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>照片质量评价 & 美颜系统</h1>
        <p>基于 GA/护照标准的证件照合规检查 + AI 美颜效果</p>
    </header>

    <main>
        <!-- Upload Section -->
        <section class="upload-section">
            <div class="drop-zone" id="dropZone">
                <div class="drop-content">
                    <span class="upload-icon">&#128247;</span>
                    <p>拖拽照片到此处，或点击选择文件</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                        选择照片
                    </button>
                </div>
            </div>

            <div class="controls" id="controls" style="display:none;">
                <div class="control-group">
                    <label>照片类型：</label>
                    <select id="photoType">
                        <option value="id_card_cn">身份证 (358x441)</option>
                        <option value="passport_cn">护照 (390x567)</option>
                        <option value="drivers_license">驾驶证</option>
                        <option value="gaokao">高考照</option>
                    </select>
                </div>
                <div class="control-group">
                    <button class="btn btn-success" onclick="runQualityCheck()">运行质量检查</button>
                </div>
            </div>
        </section>

        <!-- Preview Section -->
        <section class="preview-section" id="previewSection" style="display:none;">
            <div class="image-preview">
                <h3>原始照片</h3>
                <img id="previewImage" alt="Preview">
                <div class="image-info" id="imageInfo"></div>
            </div>
        </section>

        <!-- Quality Results -->
        <section class="results-section" id="resultsSection" style="display:none;">
            <h2>质量检查结果</h2>
            <div class="summary-bar" id="summaryBar"></div>
            <div class="results-table-container">
                <table class="results-table" id="resultsTable">
                    <thead>
                        <tr>
                            <th>状态</th>
                            <th>检查项</th>
                            <th>类别</th>
                            <th>实测值</th>
                            <th>阈值</th>
                            <th>说明</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </section>

        <!-- Beauty Section -->
        <section class="beauty-section" id="beautySection" style="display:none;">
            <h2>美颜效果</h2>
            <div class="beauty-controls">
                <div class="beauty-card">
                    <h4>磨皮</h4>
                    <label>强度：<input type="range" id="smooth_strength" min="0" max="100" value="50"></label>
                    <label>半径：<input type="range" id="smooth_radius" min="3" max="30" value="10"></label>
                    <button class="btn btn-sm" onclick="applyBeauty('skin_smoothing')">应用</button>
                </div>
                <div class="beauty-card">
                    <h4>美白</h4>
                    <label>强度：<input type="range" id="whiten_strength" min="0" max="100" value="50"></label>
                    <button class="btn btn-sm" onclick="applyBeauty('skin_whitening')">应用</button>
                </div>
                <div class="beauty-card">
                    <h4>大眼</h4>
                    <label>系数：<input type="range" id="eye_factor" min="0" max="30" value="15"></label>
                    <button class="btn btn-sm" onclick="applyBeauty('eye_enlargement')">应用</button>
                </div>
                <div class="beauty-card">
                    <h4>瘦脸</h4>
                    <label>下颌：<input type="range" id="jaw_strength" min="0" max="100" value="50"></label>
                    <button class="btn btn-sm" onclick="applyBeauty('face_slimming')">应用</button>
                </div>
            </div>
            <div class="beauty-preview" id="beautyPreview" style="display:none;">
                <h3>美颜效果对比</h3>
                <div class="compare-container">
                    <div><span>原始</span><img id="beforeImg"></div>
                    <div><span>处理后</span><img id="afterImg"></div>
                </div>
            </div>
        </section>

        <!-- Loading -->
        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>处理中...</p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
